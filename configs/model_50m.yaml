name: "my-50m-model"
model_type: "llama"

vocab_size: 50176
hidden_size: 512
intermediate_size: 640
num_hidden_layers: 16
num_attention_heads: 8
num_key_value_heads: 2
max_position_embeddings: 512
rms_norm_eps: 1.0e-6
hidden_act: "silu"
tie_word_embeddings: true
use_cache: true

# Special token ids are read from tokenizer config at runtime.
pad_token_id: null
bos_token_id: null
eos_token_id: null
